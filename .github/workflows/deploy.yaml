name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Set image tag
      id: vars
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build and Push Image
      run: |
        docker buildx build --platform linux/amd64 \
          -t sebastianm33/portafolio:$TAG \
          --push .

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name mi-eks-cluster

    - name: Deploy with rollback
      run: |
        set -e

        echo "🚀 Deploying version $TAG"

        kubectl set image deployment/web-yaml nginx=sebastianm33/portafolio:$TAG

        if ! kubectl rollout status deployment web-yaml --timeout=60s; then
          echo "❌ Deployment failed. Rolling back..."
          kubectl rollout undo deployment web-yaml
          kubectl rollout status deployment web-yaml
          exit 1
        fi

        echo "✅ Deployment successful"
