<!DOCTYPE html>
<html>
<head>
  <title>Sebastian CloudOps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 50px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    p {
      color: #94a3b8;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      display: block;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>Sebastian CloudOps</h1>
  <p>Portafolio de dibujos digitales + DevOps</p>
</header>

<section class="gallery">
  <div class="card"><img src="img-1.jpeg"></div>
  <div class="card"><img src="img-2.jpeg"></div>
  <div class="card"><img src="img-3.jpeg"></div>
  <div class="card"><img src="img-4.jpeg"></div>
  <div class="card"><img src="img-5.jpeg"></div>
  <div class="card"><img src="img-6.jpg"></div>
</section>

<footer>
  © 2026 Sebastian Martinez | Cloud & DevOps
</footer>

</body>
</html>
